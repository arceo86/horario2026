<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clausura San Andrés - Generación 2023-2026</title>
    <link rel="preload" as="image" href="horario1.jpg">
    <style>
        /* Paleta de colores Premium */
        :root {
            --azul-profundo: #071324;
            --azul-gradiente: radial-gradient(circle at center, #0f233c 0%, #050d1a 100%);
            --oro-brillante: #e5c060;
            --oro-suave: #f3e5ab;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--azul-profundo);
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden; 
            color: white;
        }

        /* --- PANTALLA DE CUENTA REGRESIVA (RELOJ) --- */
        #countdown-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--azul-gradiente);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            opacity: 1;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .countdown-titulo {
            color: var(--oro-brillante);
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(229, 192, 96, 0.3);
        }

        .timer-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .timer-box {
            background: rgba(229, 192, 96, 0.1);
            border: 1px solid var(--oro-suave);
            border-radius: 10px;
            padding: 15px 10px;
            min-width: 75px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .timer-numero {
            font-size: 2rem;
            color: var(--oro-brillante);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timer-texto {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            opacity: 0.8;
        }

        /* --- VISTA DEL HORARIO --- */
        #main-content {
            display: none; /* Oculto al inicio */
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 15px;
            background: var(--azul-gradiente);
            opacity: 0;
            transform: scale(0.96) translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #main-content.activo {
            display: flex;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .horario-wrapper {
            position: relative;
            width: 100%;
            max-width: 460px;
            margin: auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 40px rgba(229, 192, 96, 0.15);
        }

        .horario-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Destello de luz metálico (Efecto Sheen) */
        .horario-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.25) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            pointer-events: none;
        }

        .horario-wrapper.brillar::after {
            animation: pasarDestello 1.4s cubic-bezier(0.3, 1, 0.4, 1) 0.5s forwards;
        }

        @keyframes pasarDestello {
            100% { left: 150%; }
        }
    </style>
</head>
<body>

    <div id="countdown-screen">
        <div class="intro-titulo" style="font-size: 0.9rem; color: #fff; opacity: 0.6; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px;">Módulo San Andrés</div>
        <div class="countdown-titulo">Falta para la Clausura</div>
        
        <div class="timer-container">
            <div class="timer-box">
                <div class="timer-numero" id="dias">00</div>
                <div class="timer-texto">Días</div>
            </div>
            <div class="timer-box">
                <div class="timer-numero" id="horas">00</div>
                <div class="timer-texto">Horas</div>
            </div>
            <div class="timer-box">
                <div class="timer-numero" id="minutos">00</div>
                <div class="timer-texto">Minutos</div>
            </div>
            <div class="timer-box">
                <div class="timer-numero" id="segundos">00</div>
                <div class="timer-texto">Segundos</div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="horario-wrapper" id="horario-card">
            <img src="horario.png" alt="Horario Oficial de Clausura" class="horario-img">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        // Fecha de la graduación para el cálculo del reloj
        const fechaGraduacion = new Date("Jul 10, 2026 00:00:00").getTime();

        // 1. Hace funcionar el reloj en tiempo real durante la espera
        const actualizarReloj = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaGraduacion - ahora;

            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

            document.getElementById("dias").innerHTML = dias < 10 ? '0' + dias : dias;
            document.getElementById("horas").innerHTML = horas < 10 ? '0' + horas : horas;
            document.getElementById("minutos").innerHTML = minutos < 10 ? '0' + minutos : minutos;
            document.getElementById("segundos").innerHTML = segundos < 10 ? '0' + segundos : segundos;
        }, 1000);

        // 2. Temporizador automático: Desvanece el reloj a los 4 segundos (4000ms)
        setTimeout(function() {
            clearInterval(actualizarReloj); // Detiene el contador interno
            
            const relojPantalla = document.getElementById("countdown-screen");
            relojPantalla.style.opacity = '0'; // Aplica transición de desvanecido

            // Espera a que termine la animación de desvanecido para cambiar las pantallas
            setTimeout(() => {
                relojPantalla.style.display = 'none';
                mostrarHorarioOficial();
            }, 800);

        }, 4000); 

        // 3. Función que despliega el horario con los efectos premium
        function mostrarHorarioOficial() {
            document.body.style.overflow = 'auto'; // Habilita el scroll por si la pantalla es pequeña

            const contenido = document.getElementById('main-content');
            contenido.classList.add('activo');
            
            const tarjeta = document.getElementById('horario-card');
            tarjeta.classList.add('brillar');

            lanzarConfetiPremium();
        }

        // 4. Efecto de confeti en tonos dorados
        function lanzarConfetiPremium() {
            var duration = 2000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 28, spread: 60, ticks: 50, zIndex: 99 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 30 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#E5C060', '#F3E5AB', '#FFFFFF']
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#E5C060', '#F3E5AB', '#FFFFFF']
                }));
            }, 180);
        }
    </script>
</body>
</html>
