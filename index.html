<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clausura San Andrés - Generación 2023-2026</title>
    
    <link rel="preload" as="image" href="horario.jpg">
    <link rel="preload" as="image" href="birrete.png">

    <style>
        :root {
            --azul-profundo: #071324;
            --azul-gradiente: radial-gradient(circle at center, #0f233c 0%, #050d1a 100%);
            --oro-brillante: #e5c060;
            --oro-suave: #f3e5ab;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--azul-profundo);
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden; color: white;
        }

        /* --- FONDO DE LLUVIA DE SOMBREROS --- */
        #tsparticles {
            position: fixed; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 50; display: none;
        }

        /* --- PANTALLA DEL RELOJ (INTRO) --- */
        #countdown-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--azul-gradiente);
            z-index: 200; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            opacity: 1; transition: opacity 0.8s ease;
        }

        .timer-container { display: flex; gap: 10px; margin-top: 20px; }
        .timer-box { 
            background: rgba(229, 192, 96, 0.1); border: 1px solid var(--oro-suave);
            border-radius: 8px; padding: 10px; min-width: 65px;
        }
        .timer-numero { font-size: 1.8rem; color: var(--oro-brillante); font-weight: bold; }
        .timer-texto { font-size: 0.6rem; text-transform: uppercase; opacity: 0.8; }

        /* --- VISTA DEL HORARIO --- */
        #main-content {
            display: none; width: 100%; height: 100%;
            justify-content: center; align-items: flex-start;
            overflow-y: auto; padding: 20px; z-index: 100;
            position: relative; opacity: 0;
            transform: scale(0.95); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #main-content.activo { display: flex; opacity: 1; transform: scale(1); }

        /* --- CONTENEDOR CON EFECTO DE BRILLO (GLASS GLINT) --- */
        .horario-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            margin: auto;
            border-radius: 15px;
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(229, 192, 96, 0.3);
        }

        .horario-img { width: 100%; height: auto; display: block; }

        /* Zona interactiva invisible en la parte inferior */
        .enlace-inferior {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%; /* Cubre el 15% inferior de la imagen */
            background: rgba(255, 255, 255, 0); /* Completamente transparente */
            z-index: 80; /* Por encima de la imagen y del destello para que sea cliqueable */
            cursor: pointer;
        }

        /* Capa superior que crea el destello de luz */
        .horario-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%; 
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.4) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg); 
            pointer-events: none;
            z-index: 60;
        }

        /* Animación del brillo cada 4 segundos */
        #main-content.activo .horario-wrapper::after {
            animation: reflejoCristal 4s infinite ease-in-out;
        }

        @keyframes reflejoCristal {
            0% { left: -150%; }
            20% { left: 150%; } 
            100% { left: 150%; } 
        }

    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div id="countdown-screen">
        <h2 style="color: var(--oro-brillante); letter-spacing: 3px; font-size: 1.3rem;">FALTA PARA LA CLAUSURA</h2>
        <div class="timer-container">
            <div class="timer-box"><div class="timer-numero" id="dias">00</div><div class="timer-texto">Días</div></div>
            <div class="timer-box"><div class="timer-numero" id="horas">00</div><div class="timer-texto">Horas</div></div>
            <div class="timer-box"><div class="timer-numero" id="minutos">00</div><div class="timer-texto">Minutos</div></div>
            <div class="timer-box"><div class="timer-numero" id="segundos">00</div><div class="timer-texto">Segundos</div></div>
        </div>
    </div>

    <div id="main-content">
        <div class="horario-wrapper">
            <img src="horario.jpg" alt="Horario Oficial" class="horario-img">
            
            <a href="https://arceo86.github.io/prepaSA26/index.html" class="enlace-inferior" title="Ir al inicio"></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    
    <script>
        // Lógica del contador
        const fechaGraduacion = new Date("Jul 10, 2026 00:00:00").getTime();
        const tick = setInterval(() => {
            const ahora = new Date().getTime();
            const d = fechaGraduacion - ahora;
            document.getElementById("dias").innerHTML = Math.floor(d / (1000*60*60*24));
            document.getElementById("horas").innerHTML = Math.floor((d % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("minutos").innerHTML = Math.floor((d % (1000*60*60)) / (1000*60));
            document.getElementById("segundos").innerHTML = Math.floor((d % (1000*60)) / 1000);
        }, 1000);

        // Transición automática del reloj al horario a los 4 segundos
        setTimeout(() => {
            clearInterval(tick);
            const screen = document.getElementById("countdown-screen");
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                activarHorario();
            }, 800);
        }, 4000); 

        function activarHorario() {
            document.body.style.overflow = 'auto';
            document.getElementById('tsparticles').style.display = 'block';
            
            // Iniciar lluvia continua de birretes
            tsParticles.load("tsparticles", {
                fullScreen: { enable: false },
                particles: {
                    number: { value: 12 },
                    shape: { type: "image", image: { src: "birrete.png", width: 100, height: 100 } },
                    opacity: { value: 0.8 },
                    size: { value: { min: 20, max: 35 } },
                    move: { enable: true, speed: 2.5, direction: "bottom", outModes: { default: "out" } },
                    rotate: { value: { min: 0, max: 360 }, animation: { enable: true, speed: 8 } }
                }
            });

            document.getElementById('main-content').classList.add('activo');
        }
    </script>
</body>
</html>
