<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clausura San Andrés - Generación 2023-2026</title>
    
    <link rel="preload" as="image" href="horario1.png">
    <link rel="preload" as="image" href="birrete.png">

    <style>
        :root {
            --azul-profundo: #071324;
            --azul-gradiente: radial-gradient(circle at center, #0f233c 0%, #050d1a 100%);
            --oro-brillante: #e5c060;
            --oro-suave: #f3e5ab;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--azul-profundo);
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden; 
            color: white;
        }

        /* --- CONTENEDOR DE LA LLUVIA DE SOMBREROS --- */
        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 50; /* Detrás del horario, delante del fondo */
            display: none; /* Oculto durante el reloj */
        }

        /* --- PANTALLA DE CUENTA REGRESIVA --- */
        #countdown-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--azul-gradiente);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        .countdown-titulo {
            color: var(--oro-brillante);
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(229, 192, 96, 0.3);
        }

        .timer-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .timer-box {
            background: rgba(229, 192, 96, 0.1);
            border: 1px solid var(--oro-suave);
            border-radius: 10px;
            padding: 15px 10px;
            min-width: 75px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .timer-numero {
            font-size: 2rem;
            color: var(--oro-brillante);
            font-weight: bold;
        }

        .timer-texto {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #ffffff;
            opacity: 0.8;
        }

        /* --- VISTA DEL HORARIO --- */
        #main-content {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 15px;
            background: transparent;
            z-index: 100;
            position: relative;
            opacity: 0;
            transform: scale(0.96) translateY(30px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        #main-content.activo {
            display: flex;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .horario-wrapper {
            position: relative;
            width: 100%;
            max-width: 460px;
            margin: auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .horario-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .horario-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.25) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
        }

        .horario-wrapper.brillar::after {
            animation: pasarDestello 1.4s ease 0.5s forwards;
        }

        @keyframes pasarDestello {
            100% { left: 150%; }
        }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div id="countdown-screen">
        <div class="countdown-titulo">Falta para la Clausura</div>
        <div class="timer-container">
            <div class="timer-box"><div class="timer-numero" id="dias">00</div><div class="timer-texto">Días</div></div>
            <div class="timer-box"><div class="timer-numero" id="horas">00</div><div class="timer-texto">Horas</div></div>
            <div class="timer-box"><div class="timer-numero" id="minutos">00</div><div class="timer-texto">Minutos</div></div>
            <div class="timer-box"><div class="timer-numero" id="segundos">00</div><div class="timer-texto">Segundos</div></div>
        </div>
    </div>

    <div id="main-content">
        <div class="horario-wrapper" id="horario-card">
            <img src="horario.jpg" alt="Horario Oficial" class="horario-img">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    
    <script>
        const fechaGraduacion = new Date("Jul 10, 2026 00:00:00").getTime();

        const actualizarReloj = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaGraduacion - ahora;
            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);
            document.getElementById("dias").innerHTML = dias;
            document.getElementById("horas").innerHTML = horas;
            document.getElementById("minutos").innerHTML = minutos;
            document.getElementById("segundos").innerHTML = segundos;
        }, 1000);

        // Temporizador de 4 segundos
        setTimeout(function() {
            clearInterval(actualizarReloj);
            const relojPantalla = document.getElementById("countdown-screen");
            relojPantalla.style.opacity = '0';
            setTimeout(() => {
                relojPantalla.style.display = 'none';
                mostrarHorarioOficial();
            }, 800);
        }, 4000); 

        function mostrarHorarioOficial() {
            document.body.style.overflow = 'auto';
            document.getElementById('tsparticles').style.display = 'block'; 
            
            // Inicia la lluvia de sombreros
            iniciarLluviaSombreros();

            const contenido = document.getElementById('main-content');
            contenido.classList.add('activo');
            const tarjeta = document.getElementById('horario-card');
            tarjeta.classList.add('brillar');
        }

        // Configuración corregida para lluvia continua de imágenes
        function iniciarLluviaSombreros() {
            tsParticles.load("tsparticles", {
                fullScreen: { enable: false }, // Se ajusta al div, no altera tu diseño
                particles: {
                    number: {
                        value: 12, // Cantidad simultánea de birretes en pantalla
                        density: { enable: true, value_area: 800 }
                    },
                    shape: {
                        type: "image",
                        image: {
                            src: "birrete.png", // Asegúrate de tener tu imagen guardada con este nombre exacto
                            width: 100,
                            height: 100
                        }
                    },
                    opacity: {
                        value: 0.85
                    },
                    size: {
                        value: { min: 20, max: 35 } // Tamaños variados para dar profundidad
                    },
                    move: {
                        enable: true,
                        speed: 2.5, // Velocidad de caída
                        direction: "bottom",
                        straight: false,
                        outModes: {
                            default: "out" // Hace que vuelvan a salir desde arriba al tocar el fondo
                        }
                    },
                    rotate: {
                        value: { min: 0, max: 360 },
                        animation: {
                            enable: true,
                            speed: 10, // Rotación suave mientras caen
                            sync: false
                        }
                    }
                },
                interactivity: { events: { onHover: { enable: false }, onClick: { enable: false } } },
                detectRetina: true
            });
        }
    </script>
</body>
</html>
